    <style media="screen">
      html, body {
        padding: 0 /*30px 0 */;
        margin: 0;
        width: 100%;
        max-width: 100%;
        box-sizing: border-box;
      }

      .client-socials {
          display: flex;
      }

      .client-socials a {
          height: max-content;
          display: flex;
          text-decoration: none !important;
      }


      .layout-vertical > div {
          max-width: 1200px;
          width: 100%;
      }

      .layout-vertical .client-logo {
        margin:40px 0;
        display:flex;
        justify-content: center;
        align-items: center;
      }

      .layout-vertical .client-logo img, .layout-vertical object {
        max-height: 60px;
        height: 60px;
        min-height: 60px;
        max-width: 100%;
        object-fit: contain;
      }

      .layout-vertical .client-title {
        text-transform: uppercase;
        padding-top: 40px;
        margin-bottom: 40px;
      }


      .layout-vertical .client-title {
        display:flex;
        justify-content: center;
        align-items: center;
        text-align: center;
      }


      .layout-vertical .client-calculator-description {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 50px;
      }

/*
      .calc-block.layout-vertical--col-right{
        display: flex;
        justify-content: center;
        align-items: center;
      }
        */

      .client-calculator-description p {
          line-height: 1.5;
      }

      .layout-vertical .client-calculator-description p {
        text-align: center;
      }

      .layout-vertical .client-calculator-description p {
        width: 100%;
        max-width: 600px;
      }

      .layout-vertical  {
          display: flex !important;
          justify-content: center;
          flex-flow: column;
          align-items: center;
      }

      .layout-vertical {
        width: 100%;
        position: absolute;
        top: 0;
        left: 0;
        min-height: 100vh;
        box-sizing: border-box;

      }

      .layout-vertical {
          display: none;
          padding: 0 200px 80px;

      }

      .layout-vertical .client-information-block {
        display: flex;
        justify-content: space-between;
        padding-top: 20px;
        margin-top: 50px;
      }

      .layout-vertical .client-information-block .client-contacts :not(:last-child) {
        margin-bottom: 10px;
      }

      .layout-vertical .client-information-block .client-contacts span {
          line-height: 1;
      }

      .layout-vertical .client-information-block .client-socials {
        padding-top: 10px;
      }

      .layout-vertical .client-information-block .client-contacts {
        display: flex;
        flex-flow: column;
      }

      .layout-vertical .client-information-block .client-socials a svg {
        width: 30px;
        cursor: pointer;
      }

      .layout-vertical .client-information-block .client-socials :not(:last-child) {
        margin-right: 10px;
      }

      body {
        display: flex;
        padding: 30px;
        background-color: #eee;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        min-height: 100vh;
      }

      .calconic-calculator {
        width: 100%;
        max-width: 100%;
      }

      .calconic-calculator.with-layouts {
        width: 100% !important;
        max-width: 1200px;
        margin: auto 0;
        &.resizing {
            max-width: 0px;
        }
        padding-top: 50px;
      }

        .layout-vertical .calconic-calculator.with-layouts {
            padding-top: 0px;
        }

      .calconic-calculator.full-height {
        min-height: 100%;
      }

      .calconic-logo-wrapper {
       /* left: 30px;
        bottom: 30px;
        position: fixed; 
        margin-top: auto; */
        padding-top: 50px;
        align-self: flex-start;
      }

      .additional-links {
        width: auto;
      }

      .additional-links a {
        color: #999;
        font-size: 13px;
        display: inline-block;
        margin-right: 10px;
        text-decoration: none;
        font-family: 'lato', sans-serif;
      }

      .calconic-logo {
        width: 190px;
      }

      .calconic-logo a {
        text-decoration: none;
      }

      .lumi-calconic {
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      }

      .calconic-logo h3 {
        color: #999;
        font-size: 10px;
        font-weight: 700;
        font-family: 'lato', sans-serif;
        text-transform: uppercase;
        transform: translateY(6px);
        margin-left: 3px;
      }

      .calconic-logo img {
        max-width: 100%;
      }

      .loader-active {
          width: 100%;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 50%;
          position: absolute;
          top: 0;
          left: 0;
      }

      .layout-vertical .calc-block {
          width: 100%;
          position: relative;
      }

      .calc-block {
          position: relative;
          width: 50%;
      }

      .layout-vertical .calconic-calculator {
          opacity: 0;
      }

      svg g {
          stroke-width: 2 !important;
          stroke-opacity: 1 !important;
      }

      @media (max-width: 1050px) {

        .layout-vertical .client-information-block {
            flex-flow: column;
            justify-content: center;
            align-items: center;
        }

        .layout-vertical .client-contacts span {
            text-align: center;
        }

        .layout-vertical .client-contacts {
            margin-bottom: 20px;
        }

        .calconic-calculator {
          width: 100%;
          max-width: 100%;
          box-shadow: unset;
        }

        .layout-vertical .client-calculator-description p {
            width: 100%;
        }

        .layout-vertical {
            padding-left: 16px;
            padding-right: 16px;
            min-width: 350px;
            max-width: 100%;
        }

        .additional-links {
          width: 100%;
        }

        .additional-links a {
          width: 100%;
          margin-bottom: 7px;
        }
      }

      .layout-vertical .layout-vertical--col-left .client-information-block {
        display: none;
      }

      @media (min-width: 1051px) {
        .layout-vertical__column {
          width: 100%;
          height: auto;
          max-width: 100%;
          padding: 80px 20px;
          flex-direction: row;
          align-items: stretch;
        }

        .layout-vertical__column .client-information-block {
          display: none;
        }

        .layout-vertical__column .layout-vertical--col-left .client-information-block {
          display: flex;
          flex-direction: column;
        }

        .layout-vertical__column .layout-vertical--col-left .client-information-block .client-contacts {
         /* order: 1; */
        }

        .layout-vertical__column .layout-vertical--col-left .client-information-block .client-socials {
          padding-top: 20px;
        }

        .layout-vertical__column .layout-vertical--col-left .client-information-block .client-socials a {
          margin: 20px 0 35px;
        }

        .layout-vertical__column .layout-vertical--col-left {
          width: 50%;
          margin-right: 80px;
          display: flex;
          flex-direction: column;
          max-width: 540px;
        }

        .layout-vertical__column .layout-vertical--col-right {
          width: 50%;
          max-width: 540px;
        }

        .layout-vertical__column .client-logo {
          padding-top: 0;
          margin-bottom: 0;
          width: 100%;
          justify-content: initial;
          padding-bottom: 40px;
          display: flex;
        }

        .layout-vertical__column .client-title {
          justify-content: flex-start;
          text-align: left;
        }

        .layout-vertical__column .client-calculator-description {
          justify-content: flex-start;
          text-align: left;
        }

        .layout-vertical__column .client-calculator-description p {
          text-align: left;
          margin: 0;
          max-width: 400px;
        }

        .spacer {
          flex-grow: 1;
          display: flex;
        }

        .client-information-block {
          padding-bottom: 20px;
        }

        .layout-vertical__column .calc-block {
          grid-area: item-calc;
        }

        .layout-vertical__column .layout-vertical__column-container {
          display: flex;
          width: 100%;
          height: auto;
          max-width: 1200px;
          padding: 0 20px;
        }
      }
