<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V.Ar Production — Портфолио</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="core/css/style.css">
<style>
.preloader { position: fixed; inset: 0; background: #0d0d0d; display: flex; align-items: center; justify-content: center; z-index: 9999; }
.preloader-content { text-align: center; }
.preloader-title { font-family: 'Playfair Display', serif; font-size: 24px; color: #c2c2c9; margin-bottom: 20px; }
.preloader-spin { width: 40px; height: 40px; border: 2px solid #252022; border-top-color: #b35a5a; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
@keyframes spin { to { transform: rotate(360deg); } }
.preloader.hidden { display: none; }
.page { display: none; }
.page.visible { display: block; }
</style>
</head>
<body>

<div class="preloader">
  <div class="preloader-content">
    <div class="preloader-title">V.Ar Production</div>
    <div class="preloader-spin"></div>
  </div>
</div>

<div class="page">

<div class="masthead">
  <div class="masthead-title">
    V.Ar Production<br>
    <em>Портфолио</em>
  </div>
  <p class="masthead-caption">Избранные проекты визуализации интерьеров, экстерьеров и виртуальных туров.</p>
</div>

<div id="portfolio-sections"></div>

<div class="contacts">
  <div class="contact-brand">V.Ar Production</div>
  <div class="contact-row">
    <svg class="c-ico" viewBox="0 0 13 10" fill="none" stroke="currentColor" stroke-width="1.4"><rect x=".7" y=".7" width="11.6" height="8.6" rx="1.3"/><polyline points=".7,.7 6.5,6 12.3,.7"/></svg>
    <a href="mailto:varprod@outlook.com">varprod@outlook.com</a>
  </div>
  <div class="contact-row">
    <svg class="c-ico" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M1.8 1.8h2.8l1.4 3.2-1.8 1.1a6.9 6.9 0 003.5 3.5l1.1-1.8 3.2 1.4v2.8a.9.9 0 01-.9.9C5.2 13 0 7.8 0 1.9A.9.9 0 01.9 1h.9z"/></svg>
    Tel / WhatsApp / Telegram: <a href="tel:+79044449935">+7 (904) 444-99-35</a>
  </div>
</div>

</div>


<script src="source/portfolio/data.js"></script>
<script src="core/js/portfolio.js"></script>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="">
  <button class="lb-nav lb-prev" onclick="event.stopPropagation(); prevImage()">&#10094;</button>
  <button class="lb-nav lb-next" onclick="event.stopPropagation(); nextImage()">&#10095;</button>
  <button class="lb-close" onclick="closeLightbox()">&#10005;</button>
</div>

<script>
window.addEventListener('load', function() {
  var preloader = document.querySelector('.preloader');
  var page = document.querySelector('.page');
  setTimeout(function() {
    if (preloader) preloader.classList.add('hidden');
    if (page) page.classList.add('visible');
  }, 1000);
});
</script>
</body>
</html>
